- name: Provision AWS server locally
  hosts: local
  become: true
  tasks:
   - name: Update package list
     ansible.builtin.apt:
      update_cache: yes
      cache_valid_time: 3600

   - name: install packages
     ansible.builtin.apt:
      name:
        - python3-pip
        - python3-venv
        - nginx
        - postgresql
      state: present